---
- name: Deploy FastAPI application to EC2
  hosts: all
  become: true
  gather_facts: true

  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: appuser
    app_group: appuser
    app_port: 8000
    python_bin: python3.11

  tasks:

    # -------------------------------------------------------------------------
    # System packages
    # -------------------------------------------------------------------------

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - python3.11
          - python3.11-venv
          - python3.11-dev
          - python3-pip
          - nginx
          - git
          - curl
          - build-essential
          - rsync
        state: present

    # -------------------------------------------------------------------------
    # Application user
    # -------------------------------------------------------------------------

    - name: Create application group
      group:
        name: "{{ app_group }}"
        state: present

    - name: Create application user
      user:
        name: "{{ app_user }}"
        group: "{{ app_group }}"
        system: true
        shell: /bin/false
        home: "{{ app_dir }}"
        create_home: false

    # -------------------------------------------------------------------------
    # Application directory
    # -------------------------------------------------------------------------

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"

    # -------------------------------------------------------------------------
    # Sync application code
    # -------------------------------------------------------------------------

    - name: Synchronise application code to {{ app_dir }}
      synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ app_dir }}/"
        recursive: true
        delete: true
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.github"
          - "--exclude=terraform"
          - "--exclude=ansible"
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--exclude=.env"
          - "--exclude=.venv"
          - "--exclude=node_modules"
      become: false
      delegate_to: localhost

    - name: Fix ownership of application directory
      file:
        path: "{{ app_dir }}"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        recurse: true
        state: directory

    # -------------------------------------------------------------------------
    # Python virtual environment + dependencies
    # -------------------------------------------------------------------------

    - name: Create Python virtual environment at {{ venv_dir }}
      command: "{{ python_bin }} -m venv {{ venv_dir }}"
      args:
        creates: "{{ venv_dir }}/bin/activate"
      become_user: "{{ app_user }}"

    - name: Upgrade pip inside venv
      command: "{{ venv_dir }}/bin/pip install --upgrade pip"
      become_user: "{{ app_user }}"

    - name: Check if requirements.txt exists
      stat:
        path: "{{ app_dir }}/requirements.txt"
      register: req_file

    - name: Install Python dependencies from requirements.txt
      command: "{{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt"
      when: req_file.stat.exists
      become_user: "{{ app_user }}"

    - name: Install gunicorn and uvicorn (ensure always present)
      command: "{{ venv_dir }}/bin/pip install gunicorn uvicorn[standard] fastapi"
      become_user: "{{ app_user }}"

    # -------------------------------------------------------------------------
    # .env file (rendered via shell to tolerate empty values)
    # -------------------------------------------------------------------------

    - name: Render .env file
      shell: |
        cat > {{ app_dir }}/.env <<'ENVEOF'
        APP_ENV=production
        PORT={{ app_port }}
        HOST=0.0.0.0
        ENVEOF
      args:
        executable: /bin/bash
      become_user: "{{ app_user }}"

    # -------------------------------------------------------------------------
    # Systemd service
    # -------------------------------------------------------------------------

    - name: Deploy systemd service unit
      copy:
        dest: /etc/systemd/system/app.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=FastAPI application (gunicorn + uvicorn)
          After=network.target

          [Service]
          Type=exec
          User={{ app_user }}
          Group={{ app_group }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app \
            -k uvicorn.workers.UvicornWorker \
            -w 4 \
            -b 0.0.0.0:{{ app_port }}
          Restart=on-failure
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=app

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    - name: Enable and start application service
      systemd:
        name: app
        enabled: true
        state: restarted

    # -------------------------------------------------------------------------
    # Nginx configuration
    # -------------------------------------------------------------------------

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Deploy nginx site configuration
      copy:
        dest: /etc/nginx/sites-available/app
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              server_name _;

              access_log /var/log/nginx/app_access.log;
              error_log  /var/log/nginx/app_error.log;

              location / {
                  proxy_pass         http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_set_header   Upgrade           $http_upgrade;
                  proxy_set_header   Connection        "upgrade";
                  proxy_read_timeout 60s;
              }
          }

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Test nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false

    - name: Enable and restart nginx
      systemd:
        name: nginx
        enabled: true
        state: restarted

    # -------------------------------------------------------------------------
    # Post-deploy health check on the instance
    # -------------------------------------------------------------------------

    - name: Wait for gunicorn to be listening on port {{ app_port }}
      wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        timeout: 60
        state: started

    - name: Health check - GET http://localhost:{{ app_port }}/health
      uri:
        url: "http://localhost:{{ app_port }}/health"
        method: GET
        status_code: 200
        timeout: 10
      register: health_result
      retries: 6
      delay: 5
      until: health_result.status == 200

    - name: Report health check result
      debug:
        msg: "Health check passed: {{ health_result.json }}"