---
- name: Configure EC2 and deploy FastAPI app
  hosts: all
  become: true
  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: appuser
    app_env: "{{ app_env | default('production') }}"

  tasks:
    # -------------------------------------------------------------------------
    # System packages
    # -------------------------------------------------------------------------
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - python3.11
          - python3.11-venv
          - python3.11-dev
          - python3-pip
          - nginx
          - rsync
          - curl
          - build-essential
        state: present

    # -------------------------------------------------------------------------
    # App user
    # -------------------------------------------------------------------------
    - name: Create application user
      user:
        name: "{{ app_user }}"
        system: yes
        shell: /bin/false
        home: "{{ app_dir }}"
        create_home: no

    # -------------------------------------------------------------------------
    # Application directory
    # -------------------------------------------------------------------------
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    # -------------------------------------------------------------------------
    # Copy application source from rsync staging area
    # -------------------------------------------------------------------------
    - name: Sync application source to /opt/app
      shell: |
        rsync -a --delete \
          --exclude='.git' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          /tmp/app-src/ {{ app_dir }}/
      args:
        executable: /bin/bash

    - name: Fix ownership of application files
      file:
        path: "{{ app_dir }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    # -------------------------------------------------------------------------
    # Python virtual environment
    # -------------------------------------------------------------------------
    - name: Create Python virtual environment
      command: python3.11 -m venv {{ venv_dir }}
      args:
        creates: "{{ venv_dir }}/bin/python"

    - name: Upgrade pip inside venv
      command: "{{ venv_dir }}/bin/pip install --upgrade pip"

    - name: Install Python dependencies from requirements.txt
      command: "{{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt"
      args:
        chdir: "{{ app_dir }}"

    - name: Fix venv ownership
      file:
        path: "{{ venv_dir }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    # -------------------------------------------------------------------------
    # .env file (rendered via shell to handle empty values safely)
    # -------------------------------------------------------------------------
    - name: Write .env file
      shell: |
        cat > {{ app_dir }}/.env << 'ENVEOF'
        APP_ENV={{ app_env }}
        PORT=8000
        HOST=0.0.0.0
        ENVEOF
        chown {{ app_user }}:{{ app_user }} {{ app_dir }}/.env
        chmod 640 {{ app_dir }}/.env
      args:
        executable: /bin/bash

    # -------------------------------------------------------------------------
    # systemd service
    # -------------------------------------------------------------------------
    - name: Write systemd service unit
      copy:
        dest: /etc/systemd/system/fastapi.service
        content: |
          [Unit]
          Description=FastAPI application (gunicorn + uvicorn)
          After=network.target

          [Service]
          Type=notify
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app \
            -k uvicorn.workers.UvicornWorker \
            -w 4 \
            -b 0.0.0.0:8000 \
            --access-logfile - \
            --error-logfile -
          ExecReload=/bin/kill -s HUP $MAINPID
          KillMode=mixed
          TimeoutStopSec=5
          PrivateTmp=true
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
        owner: root
        group: root

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and restart fastapi service
      systemd:
        name: fastapi
        enabled: yes
        state: restarted

    # -------------------------------------------------------------------------
    # nginx - proxy port 80 -> 127.0.0.1:8000
    # -------------------------------------------------------------------------
    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Write nginx site config
      copy:
        dest: /etc/nginx/sites-available/fastapi
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass         http://127.0.0.1:8000;
                  proxy_http_version 1.1;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_set_header   Upgrade           $http_upgrade;
                  proxy_set_header   Connection        "upgrade";
                  proxy_read_timeout 60s;
                  proxy_connect_timeout 60s;
              }
          }
        mode: "0644"
        owner: root
        group: root

    - name: Enable fastapi nginx site
      file:
        src: /etc/nginx/sites-available/fastapi
        dest: /etc/nginx/sites-enabled/fastapi
        state: link

    - name: Test nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false

    - name: Enable and restart nginx
      systemd:
        name: nginx
        enabled: yes
        state: restarted

    # -------------------------------------------------------------------------
    # Verify app is responding locally before handing back to CI
    # -------------------------------------------------------------------------
    - name: Wait for fastapi service to be active
      systemd:
        name: fastapi
      register: fastapi_status
      until: fastapi_status.status.ActiveState == "active"
      retries: 12
      delay: 5

    - name: Local health check (gunicorn direct)
      uri:
        url: http://127.0.0.1:8000/health
        method: GET
        status_code: 200
        timeout: 10
      register: health_direct
      retries: 6
      delay: 5
      until: health_direct.status == 200

    - name: Local health check (via nginx)
      uri:
        url: http://127.0.0.1/health
        method: GET
        status_code: 200
        timeout: 10
      register: health_nginx
      retries: 6
      delay: 5
      until: health_nginx.status == 200