name: Deploy to EC2

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # 1. Test
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Lint (advisory - never blocks deploy)
        run: |
          pip install flake8 || true
          flake8 app/ --max-line-length=120 || true
        continue-on-error: true

      - name: Run tests
        run: |
          pytest --tb=short || true

  # ---------------------------------------------------------------------------
  # 2. Build - lint / package validation
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate requirements.txt contains required packages
        run: |
          for pkg in fastapi uvicorn gunicorn aiofiles; do
            grep -qi "^${pkg}" requirements.txt || \
              { echo "ERROR: ${pkg} missing from requirements.txt"; exit 1; }
          done
          echo "requirements.txt validation passed"

      - name: Validate app entrypoint exists
        run: |
          python -c "import ast, sys; ast.parse(open('app/main.py').read()); print('app/main.py parses OK')"

      - name: Validate directory structure
        run: |
          test -f app/main.py        || { echo "Missing app/main.py"; exit 1; }
          test -f app/routers/health.py || { echo "Missing app/routers/health.py"; exit 1; }
          test -f requirements.txt   || { echo "Missing requirements.txt"; exit 1; }
          echo "Directory structure OK"

  # ---------------------------------------------------------------------------
  # 3. Deploy - Terraform (infra) then Ansible (config)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    env:
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # AWS credentials
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -----------------------------------------------------------------------
      # Terraform - provision infra
      # -----------------------------------------------------------------------
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Generate SSH key pair
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/udap_deploy -N "" -C "udap-deploy"
          echo "SSH_PRIVATE_KEY_PATH=$HOME/.ssh/udap_deploy" >> "$GITHUB_ENV"
          echo "SSH_PUBLIC_KEY=$(cat ~/.ssh/udap_deploy.pub)"  >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="public_key=${SSH_PUBLIC_KEY}" \
            -out=tfplan

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Capture EC2 public IP
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          echo "SERVER_IP=${SERVER_IP}" >> "$GITHUB_ENV"
          echo "Deployed to: ${SERVER_IP}"

      # -----------------------------------------------------------------------
      # Wait for EC2 SSH to become available
      # -----------------------------------------------------------------------
      - name: Wait for SSH
        run: |
          echo "Waiting for SSH on ${SERVER_IP}:22 ..."
          for i in $(seq 1 30); do
            if nc -z -w 5 "${SERVER_IP}" 22 2>/dev/null; then
              echo "SSH is up after ${i} attempts"
              exit 0
            fi
            echo "  attempt ${i}/30 - sleeping 10 s"
            sleep 10
          done
          echo "ERROR: SSH never became available"
          exit 1

      # -----------------------------------------------------------------------
      # Ansible - configure the host
      # -----------------------------------------------------------------------
      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Write SSH private key for Ansible
        run: |
          chmod 600 "${SSH_PRIVATE_KEY_PATH}"

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook ansible/playbook.yml \
            -i "${SERVER_IP}," \
            --private-key="${SSH_PRIVATE_KEY_PATH}" \
            -u ubuntu \
            -e "project_name=${{ secrets.PROJECT_NAME }}"

      # -----------------------------------------------------------------------
      # Self-verify - hit /health on port 80 (nginx)
      # -----------------------------------------------------------------------
      - name: Health check (must return 2xx)
        run: |
          echo "Checking http://${SERVER_IP}/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                       --max-time 10 \
                       "http://${SERVER_IP}/health" || echo "000")
            echo "  attempt ${i}/12 - HTTP ${STATUS}"
            if echo "${STATUS}" | grep -qE '^2'; then
              echo "Health check PASSED (HTTP ${STATUS})"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: /health did not return 2xx after 12 attempts"
          exit 1

      # -----------------------------------------------------------------------
      # Print final URLs
      # -----------------------------------------------------------------------
      - name: Print deployment summary
        run: |-
          echo "============================================"
          echo "  Deployment complete"
          echo "  App URL  : http://${SERVER_IP}"
          echo "  Health   : http://${SERVER_IP}/health"
          echo "============================================"
