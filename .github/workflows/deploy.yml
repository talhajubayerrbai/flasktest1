name: Deploy FastAPI to EC2

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # TEST
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest httpx || true

      - name: Run tests
        run: |
          pytest --tb=short -q || true

  # ---------------------------------------------------------------------------
  # BUILD  (provision infra with Terraform)
  # ---------------------------------------------------------------------------
  build:
    name: Terraform Provision
    runs-on: ubuntu-latest
    needs: test
    outputs:
      server_ip: ${{ steps.tf_output.outputs.server_ip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate SSH key pair
        run: |
          ssh-keygen -t ed25519 -C "udap-deploy" -f /tmp/deploy_key -N ""
          echo "SSH_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          cat /tmp/deploy_key >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "SSH_PUBLIC_KEY=$(cat /tmp/deploy_key.pub)" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="public_key=${{ env.SSH_PUBLIC_KEY }}"

      - name: Get Terraform outputs
        id: tf_output
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          echo "server_ip=${SERVER_IP}" >> $GITHUB_OUTPUT
          echo "SERVER_IP=${SERVER_IP}" >> $GITHUB_ENV

      - name: Save SSH private key for deploy job
        run: |
          mkdir -p /tmp/ssh
          echo "${{ env.SSH_PRIVATE_KEY }}" > /tmp/ssh/deploy_key
          chmod 600 /tmp/ssh/deploy_key

      - name: Upload SSH private key as artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-ssh-key
          path: /tmp/ssh/deploy_key
          retention-days: 1

  # ---------------------------------------------------------------------------
  # DEPLOY  (configure + deploy with Ansible)
  # ---------------------------------------------------------------------------
  deploy:
    name: Ansible Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download SSH private key
        uses: actions/download-artifact@v4
        with:
          name: deploy-ssh-key
          path: /tmp/ssh

      - name: Fix SSH key permissions
        run: chmod 600 /tmp/ssh/deploy_key

      - name: Set server IP from build output
        run: |
          echo "SERVER_IP=${{ needs.build.outputs.server_ip }}" >> $GITHUB_ENV

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible python3-pip
          pip install ansible --quiet

      - name: Wait for EC2 SSH to become available
        run: |
          SERVER_IP="${{ needs.build.outputs.server_ip }}"
          echo "Waiting for SSH on ${SERVER_IP}..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -o BatchMode=yes \
                   -i /tmp/ssh/deploy_key \
                   ubuntu@${SERVER_IP} "echo ready" 2>/dev/null; then
              echo "SSH is available."
              break
            fi
            echo "Attempt $i/30 - retrying in 10s..."
            sleep 10
          done

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          SERVER_IP="${{ needs.build.outputs.server_ip }}"
          ansible-playbook \
            -i "${SERVER_IP}," \
            -u ubuntu \
            --private-key /tmp/ssh/deploy_key \
            ansible/playbook.yml

      - name: Smoke test - verify app is reachable
        run: |-
          SERVER_IP="${{ needs.build.outputs.server_ip }}"
          APP_URL="http://${SERVER_IP}"
          echo "Smoke testing ${APP_URL}/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${APP_URL}/health" || echo "000")
            echo "Attempt $i: HTTP ${STATUS}"
            if [[ "${STATUS}" =~ ^[23] ]]; then
              echo "Smoke test PASSED (HTTP ${STATUS})"
              exit 0
            fi
            sleep 10
          done
          echo "Smoke test FAILED - app did not return 2xx/3xx after retries"
          exit 1
